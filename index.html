<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河南省中考查分系统</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --primary: #c41e3a;
            --primary-dark: #a01830;
            --gold: #d4a843;
            --gold-light: #fdf6e8;
            --text: #2c2c2c;
            --text-secondary: #5a5a5a;
            --border: #e0e0e0;
            --input-bg: #f8f9fa;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.10);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.14);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
            background: linear-gradient(160deg, #f7f0e8 0%, #f0f2f5 30%, #e8ecf3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -180px;
            right: -120px;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(196, 30, 58, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -160px;
            left: -100px;
            width: 460px;
            height: 460px;
            background: radial-gradient(circle, rgba(212, 168, 67, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        /* 顶部徽标 */
        .header-badge {
            text-align: center;
            margin-bottom: 22px;
        }
        .header-badge .icon-wrap {
            display: inline-block;
            width: 54px;
            height: 54px;
            background: var(--primary);
            border-radius: 50%;
            line-height: 54px;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.30);
            margin-bottom: 8px;
        }
        .header-badge .sys-label {
            font-size: 13px;
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* 卡片 */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 32px 28px 28px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            transition: box-shadow var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .card-subtitle {
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }
        .card-subtitle .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            margin: 0 6px;
            vertical-align: middle;
            position: relative;
            top: -1px;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        .form-group label .required {
            color: var(--primary);
            margin-left: 2px;
        }
        .form-group input {
            width: 100%;
            height: 46px;
            padding: 0 16px;
            font-size: 15px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: all var(--transition);
            letter-spacing: 0.4px;
        }
        .form-group input:focus {
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.07);
        }
        .form-group input::placeholder {
            color: #b0b0b0;
            letter-spacing: 0.2px;
        }

        /* 按钮 */
        .btn-query {
            width: 100%;
            height: 48px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            margin-top: 6px;
            transition: all var(--transition);
            box-shadow: 0 4px 14px rgba(196, 30, 58, 0.28);
            position: relative;
            overflow: hidden;
        }
        .btn-query:hover {
            background: var(--primary-dark);
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.38);
            transform: translateY(-1px);
        }
        .btn-query:active {
            transform: scale(0.975);
            box-shadow: 0 2px 8px rgba(196, 30, 58, 0.25);
            transition: 0.1s ease;
        }
        .btn-query.loading {
            pointer-events: none;
            opacity: 0.82;
            letter-spacing: 2px;
        }
        .btn-query .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.35);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
            position: relative;
            top: -1px;
        }
        .btn-query.loading .spinner {
            display: inline-block;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 提示信息 */
        .toast {
            text-align: center;
            min-height: 20px;
            font-size: 13px;
            color: #e74c3c;
            margin-top: 8px;
            letter-spacing: 0.3px;
            transition: all var(--transition);
        }
        .toast.success {
            color: #27ae60;
        }

        /* 成绩展示区 */
        .result-area {
            margin-top: 20px;
            display: none;
            animation: fadeSlideIn 0.5s ease forwards;
        }
        .result-area.show {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 成绩卡片 */
        .score-card {
            background: #fdfcf9;
            border: 1.5px solid #e8dfcc;
            border-radius: var(--radius);
            padding: 20px 20px 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
        }
        .score-card .student-info {
            text-align: center;
            margin-bottom: 16px;
            padding-bottom: 14px;
            border-bottom: 1px dashed #e0d8c4;
        }
        .score-card .student-info .name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 0.5px;
        }
        .score-card .student-info .exam-id {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 3px;
            letter-spacing: 0.4px;
        }
        .score-card .student-info .badge {
            display: inline-block;
            background: var(--gold-light);
            color: #8b6914;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            margin-top: 6px;
            letter-spacing: 0.5px;
            border: 1px solid #e8d5a0;
        }

        /* 成绩表格 */
        .score-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .score-table tr {
            border-bottom: 1px solid #f0ebe0;
            transition: background 0.2s;
        }
        .score-table tr:hover {
            background: #fffdf7;
        }
        .score-table tr:last-child {
            border-bottom: none;
        }
        .score-table td {
            padding: 10px 6px;
            letter-spacing: 0.3px;
        }
        .score-table .subject {
            font-weight: 600;
            color: var(--text);
            width: 40%;
        }
        .score-table .score-val {
            text-align: right;
            font-weight: 700;
            color: #2c2c2c;
            font-size: 16px;
            width: 25%;
            letter-spacing: 0.5px;
        }
        .score-table .score-full {
            text-align: right;
            color: #999;
            font-size: 12px;
            width: 35%;
        }
        .score-table .highlight-score {
            color: var(--primary);
            font-size: 17px;
        }

        /* 总分行 */
        .total-row {
            background: linear-gradient(135deg, #fffdf5 0%, #fef9ea 100%);
            border-radius: 0 0 8px 8px;
            font-weight: 700;
        }
        .total-row td {
            padding: 13px 6px;
            font-size: 17px;
            letter-spacing: 0.6px;
            color: #8b5e14;
        }
        .total-row .total-label {
            font-size: 16px;
            letter-spacing: 1px;
        }
        .total-row .total-score {
            font-size: 26px;
            font-weight: 800;
            color: #b8860b;
            letter-spacing: 1px;
        }

        /* 重新查询按钮 */
        .btn-reset {
            display: block;
            width: 100%;
            margin-top: 14px;
            height: 42px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--primary);
            background: transparent;
            border: 1.5px solid var(--primary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
        }
        .btn-reset:hover {
            background: #fef5f6;
            border-color: var(--primary-dark);
            color: var(--primary-dark);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .card {
                padding: 22px 16px 20px;
                border-radius: 12px;
            }
            .card-title {
                font-size: 19px;
            }
            .score-table td {
                padding: 8px 4px;
                font-size: 13px;
            }
            .score-table .score-val {
                font-size: 14px;
            }
            .total-row .total-score {
                font-size: 22px;
            }
            .btn-query {
                height: 44px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 顶部徽标 -->
        <div class="header-badge">
            <div class="icon-wrap">📋</div>
            <div class="sys-label">河南省教育局</div>
        </div>

        <!-- 主卡片 -->
        <div class="card">
            <div class="card-title">中考查分系统</div>
            <div class="card-subtitle">
                <span>2026年</span><span class="dot"></span><span>普通高中招生考试</span>
            </div>

            <!-- 查询表单 -->
            <form id="queryForm" autocomplete="off" novalidate>
                <div class="form-group">
                    <label for="studentName">考生姓名<span class="required">*</span></label>
                    <input type="text" id="studentName" placeholder="请输入考生姓名" maxlength="20" autocomplete="off">
                </div>
                <div class="form-group">
                    <label for="examNumber">准考证号<span class="required">*</span></label>
                    <input type="text" id="examNumber" placeholder="请输入准考证号" maxlength="18" autocomplete="off" inputmode="numeric">
                </div>
                <button type="submit" class="btn-query" id="btnQuery">
                    <span class="spinner"></span>查询成绩
                </button>
            </form>
            <div class="toast" id="toast"></div>

            <!-- 成绩展示区 -->
            <div class="result-area" id="resultArea">
                <div class="score-card">
                    <div class="student-info">
                        <div class="name" id="displayName">—</div>
                        <div class="exam-id">准考证号：<span id="displayExamId">—</span></div>
                        <div class="badge">✅ 成绩已公布</div>
                        <div class="custom-note">考的啥啊跳楼吧😂</div>
                    </div>
                    <table class="score-table">
                        <tbody>
                            <tr>
                                <td class="subject">语文</td>
                                <td class="score-val highlight-score">0</td>
                                <td class="score-full">满分 120</td>
                            </tr>
                            <tr>
                                <td class="subject">数学</td>
                                <td class="score-val highlight-score">0</td>
                                <td class="score-full">满分 120</td>
                            </tr>
                            <tr>
                                <td class="subject">英语</td>
                                <td class="score-val highlight-score">0</td>
                                <td class="score-full">满分 120</td>
                            </tr>
                            <tr>
                                <td class="subject">化学</td>
                                <td class="score-val">0</td>
                                <td class="score-full">满分 50</td>
                            </tr>
                            <tr>
                                <td class="subject">物理</td>
                                <td class="score-val">0</td>
                                <td class="score-full">满分 70</td>
                            </tr>
                            <tr>
                                <td class="subject">道德与法治</td>
                                <td class="score-val">0</td>
                                <td class="score-full">满分 70</td>
                            </tr>
                            <tr>
                                <td class="subject">历史</td>
                                <td class="score-val">0</td>
                                <td class="score-full">满分 50</td>
                            </tr>
                            <tr>
                                <td class="subject">体育</td>
                                <td class="score-val">0</td>
                                <td class="score-full">满分 100</td>
                            </tr>
                            <tr class="total-row">
                                <td class="total-label">📌 总分</td>
                                <td class="total-score" colspan="2">老傻子</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <button type="button" class="btn-reset" id="btnReset">🔄 重新查询</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('queryForm');
            const btnQuery = document.getElementById('btnQuery');
            const btnReset = document.getElementById('btnReset');
            const toast = document.getElementById('toast');
            const resultArea = document.getElementById('resultArea');
            const inputName = document.getElementById('studentName');
            const inputExam = document.getElementById('examNumber');
            const displayName = document.getElementById('displayName');
            const displayExamId = document.getElementById('displayExamId');
            const spinner = btnQuery.querySelector('.spinner');

            let isQuerying = false;

            // 表单提交
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                if (isQuerying) return;

                const nameVal = inputName.value.trim();
                const examVal = inputExam.value.trim();

                // 清除之前的提示样式
                toast.className = 'toast';
                toast.textContent = '';

                // 验证姓名
                if (!nameVal) {
                    toast.textContent = '⚠️ 请输入考生姓名';
                    inputName.focus();
                    return;
                }
                if (nameVal.length < 2) {
                    toast.textContent = '⚠️ 请输入有效的考生姓名（至少2个字符）';
                    inputName.focus();
                    return;
                }

                // 验证准考证号
                if (!examVal) {
                    toast.textContent = '⚠️ 请输入准考证号';
                    inputExam.focus();
                    return;
                }
                if (!/^\d{6,18}$/.test(examVal)) {
                    toast.textContent = '⚠️ 准考证号格式不正确（6-18位数字）';
                    inputExam.focus();
                    return;
                }

                // 开始查询
                startQuery(nameVal, examVal);
            });

            function startQuery(nameVal, examVal) {
                isQuerying = true;
                btnQuery.classList.add('loading');
                btnQuery.textContent = '';
                btnQuery.appendChild(spinner);
                btnQuery.appendChild(document.createTextNode(' 查询中...'));
                toast.className = 'toast';
                toast.textContent = '';
                resultArea.classList.remove('show');

                // 模拟网络请求延迟
                setTimeout(function() {
                    // 显示成绩
                    displayName.textContent = nameVal;
                    displayExamId.textContent = examVal;
                    resultArea.classList.add('show');
                    toast.className = 'toast success';
                    toast.textContent = '✅ 成绩查询成功！';

                    // 滚动到成绩区域
                    resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

                    // 恢复按钮
                    finishQuery();
                }, 1200);
            }

            function finishQuery() {
                isQuerying = false;
                btnQuery.classList.remove('loading');
                btnQuery.textContent = '查询成绩';
                // 确保spinner还在DOM中以便下次使用
                if (!btnQuery.contains(spinner)) {
                    btnQuery.prepend(spinner);
                }
            }

            // 重新查询
            btnReset.addEventListener('click', function() {
                resultArea.classList.remove('show');
                toast.className = 'toast';
                toast.textContent = '';
                inputName.value = '';
                inputExam.value = '';
                inputName.focus();
                // 滚动回顶部
                document.querySelector('.card').scrollIntoView({ behavior: 'smooth', block: 'start' });
            });

            // 输入时清除提示
            inputName.addEventListener('input', function() {
                if (toast.textContent && toast.className === 'toast') {
                    toast.textContent = '';
                }
            });
            inputExam.addEventListener('input', function() {
                if (toast.textContent && toast.className === 'toast') {
                    toast.textContent = '';
                }
            });

            // 自动聚焦
            inputName.focus();
        })();
    </script>
</body>
</html>
